{% extends "base.html" %}
{% block title %}Register{% endblock %}

{% block content %}

<div class="max-w-md mx-auto space-y-6">

    <h3 class="text-2xl font-bold text-indigo-400 tracking-wide">
        Create Account
    </h3>

    <form method="post" class="space-y-5">
        {% csrf_token %}

        <!-- Form Fields -->
        <div class="space-y-4 text-gray-300
                    [&_input]:w-full
                    [&_input]:px-4
                    [&_input]:py-2
                    [&_input]:rounded-lg
                    [&_input]:bg-neutral-800
                    [&_input]:border
                    [&_input]:border-neutral-700
                    [&_input]:text-gray-200
                    [&_input]:placeholder-gray-500
                    [&_input]:focus:outline-none
                    [&_input]:focus:border-indigo-500
                    [&_input]:focus:ring-2
                    [&_input]:focus:ring-indigo-500/40
                    [&_input]:transition
                    [&_input]:duration-300
                    [&_label]:block
                    [&_label]:mb-1
                    [&_label]:text-sm
                    [&_label]:text-gray-400">

            {{ form.as_p }}

        </div>

        <!-- Submit Button -->
        <button type="submit"
                class="w-full bg-indigo-600 hover:bg-indigo-500
                       py-2 rounded-lg font-semibold
                       shadow-lg shadow-indigo-600/40
                       transition duration-300">
            Create Account
        </button>

    </form>

</div>

{% endblock %}
