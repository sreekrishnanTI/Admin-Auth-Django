{% extends "base.html" %}
{% block title %}Delete User{% endblock %}

{% block content %}

<div class="max-w-md mx-auto space-y-6">

    <h3 class="text-2xl font-bold text-red-400 tracking-wide">
        Delete User
    </h3>

    <div class="bg-neutral-800 border border-red-500/40 
                rounded-xl p-6 shadow-lg shadow-red-900/30">

        <p class="text-gray-300">
            Are you sure you want to delete 
            <span class="text-white font-semibold">
                {{ target_user.username }}
            </span>?
        </p>

        <p class="text-sm text-red-400 mt-2">
            This action cannot be undone.
        </p>

        <form method="post" class="mt-6 flex gap-4">
            {% csrf_token %}

            <!-- Confirm Delete Button -->
            <button type="submit"
                    class="bg-red-600 hover:bg-red-500
                           px-4 py-2 rounded-lg font-semibold
                           shadow-lg shadow-red-600/40
                           transition duration-300">
                Confirm Delete
            </button>

            <!-- Cancel Button -->
            <a href="{% url 'user_list' %}"
               class="px-4 py-2 rounded-lg border border-neutral-600
                      text-gray-300 hover:bg-neutral-700
                      transition duration-300">
                Cancel
            </a>
        </form>

    </div>

</div>

{% endblock %}
