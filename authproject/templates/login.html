{% extends "base.html" %}
{% block title %}Login{% endblock %}

{% block content %}

<div class="max-w-md mx-auto">

    <h3 class="text-2xl font-bold text-indigo-400 mb-6 tracking-wide">
        Login
    </h3>

    <form method="post" class="space-y-5">
        {% csrf_token %}

        <!-- Username -->
        <div>
            <input type="text"
                   name="username"
                   placeholder="Username"
                   required
                   class="w-full px-4 py-2 rounded-lg 
                          bg-neutral-800 border border-neutral-700
                          focus:outline-none focus:border-indigo-500
                          focus:ring-2 focus:ring-indigo-500/40
                          text-gray-200 placeholder-gray-500
                          transition duration-300">
        </div>

        <!-- Password -->
        <div>
            <input type="password"
                   name="password"
                   placeholder="Password"
                   required
                   class="w-full px-4 py-2 rounded-lg 
                          bg-neutral-800 border border-neutral-700
                          focus:outline-none focus:border-indigo-500
                          focus:ring-2 focus:ring-indigo-500/40
                          text-gray-200 placeholder-gray-500
                          transition duration-300">
        </div>

        <!-- Submit Button -->
        <button type="submit"
                class="w-full bg-indigo-600 hover:bg-indigo-500
                       py-2 rounded-lg font-semibold
                       shadow-lg shadow-indigo-600/40
                       transition duration-300">
            Login
        </button>
    </form>

    {% if error %}
        <div class="mt-5 px-4 py-2 rounded-lg 
                    bg-red-600/20 border border-red-500/40
                    text-red-400 text-sm">
            {{ error }}
        </div>
    {% endif %}

</div>

{% endblock %}
